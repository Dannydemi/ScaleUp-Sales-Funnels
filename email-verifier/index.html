<!DOCTYPE html>
<html>
<head>
  <title>Email Verifier</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      text-align: center;
      margin: 0;
    }

    .header {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #3b82f6;
    }

    .sub {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 5px;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      margin: 40px auto;
      width: 420px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
      background: #020617;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #1e293b;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: bold;
    }

    .safe { background: #065f46; color: #10b981; }
    .risky { background: #78350f; color: #f59e0b; }
    .danger { background: #7f1d1d; color: #ef4444; }

    .loader {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="header">
  ScaleUp Email Verifier
  <div class="sub">Clean your leads. Improve deliverability.</div>
</div>

<div class="box">

  <input type="email" id="email" placeholder="Enter single email..." />
  <button onclick="verifyEmail()">Verify One</button>

  <hr>

  <input type="file" id="file" />
  <button onclick="verifyBulk()">Upload & Verify Bulk</button>

  <button onclick="downloadCSV()">Download Results</button>
  <button onclick="downloadSafeCSV()">Download SAFE Emails Only</button>
  
  <div class="result" id="result">Result will appear here...</div>
</div>

<!-- MODAL -->
<div id="leadModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
  <div style="background:#1e293b; padding:20px; border-radius:10px; width:300px;">
    <h3>Enter your email to view results</h3>
    <input type="email" id="userEmail" placeholder="Your email" />
    <button id="unlockBtn" onclick="unlockResults()">Unlock Results</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const API_URL = "https://email-verifier-dkrb.onrender.com/verify";
const LEAD_URL = "https://script.google.com/macros/s/AKfycbyFZQzzFBUdAWiMjHlOdpTfbPN5APEuR0_LcLUnumZVdrOtoJ5OoogpeqV-bRIupH22/exec";

let lastResults = [];
let pendingResult = [];
let originalRows = [];
let headers = [];

// ================= SINGLE =================
async function verifyEmail() {
  const email = document.getElementById("email").value;
  const resultBox = document.getElementById("result");

  if (!email) {
    resultBox.innerText = "❌ Please enter an email";
    return;
  }

  resultBox.innerHTML = '<div class="loader">⏳ Verifying email...</div>';

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  pendingResult = [data];
  document.getElementById("leadModal").style.display = "flex";
}

// ================= UNLOCK =================
async function unlockResults() {
  const userEmail = document.getElementById("userEmail").value;
  const btn = document.getElementById("unlockBtn");

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(userEmail)) {
    alert("Enter valid email");
    return;
  }

  btn.innerText = "Checking...";
  btn.disabled = true;

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email: userEmail })
  });

  const data = await res.json();

  if (!data.valid || data.status === "DANGEROUS") {
    alert("Use a real email");
    btn.innerText = "Unlock Results";
    btn.disabled = false;
    return;
  }

  await fetch(LEAD_URL, {
    method: "POST",
    body: JSON.stringify({
      userEmail,
      type: pendingResult.length > 1 ? "bulk" : "single",
      checkedEmail: pendingResult.map(r => r.email).join(", ")
    })
  });

  document.getElementById("leadModal").style.display = "none";
  displayTable(pendingResult);

  btn.innerText = "Unlock Results";
  btn.disabled = false;
}

// ================= BULK =================
async function verifyBulk() {
  const file = document.getElementById("file").files[0];
  const resultBox = document.getElementById("result");

  if (!file) {
    resultBox.innerText = "❌ Please select a file";
    return;
  }

  resultBox.innerHTML = '<div class="loader">⏳ Processing bulk emails...</div>';

  try {
    let emails = [];

    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    originalRows = json;
    headers = Object.keys(json[0] || {});

    emails = json.map(row => {
      let value =
        row.Email ||
        row.email ||
        Object.values(row).find(v =>
          typeof v === "string" && v.includes("@")
        );

      return { email: value, row: row };
    }).filter(e => e.email);

    let results = [];

    for (let item of emails) {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: item.email })
      });

      const data = await res.json();

      results.push({
        ...data,
        row: item.row
      });

      await new Promise(r => setTimeout(r, 200));
    }

    pendingResult = results;
    document.getElementById("leadModal").style.display = "flex";

  } catch (error) {
    resultBox.innerText = "❌ Failed to process file";
  }
}

// ================= TABLE =================
function displayTable(results) {
  lastResults = results;

  const resultBox = document.getElementById("result");

  let table = `
    <table>
      <tr>
        <th>Email</th>
        <th>Status</th>
        <th>Score</th>
      </tr>
  `;

  results.forEach(r => {
    let badgeClass = "";

    if (r.status === "SAFE") badgeClass = "badge safe";
    if (r.status === "RISKY") badgeClass = "badge risky";
    if (r.status === "DANGEROUS") badgeClass = "badge danger";

    table += `
      <tr>
        <td>${r.email}</td>
        <td><span class="${badgeClass}">${r.status}</span></td>
        <td>${r.score}</td>
      </tr>
    `;
  });

  table += "</table>";

  resultBox.innerHTML = table;
}

// ================= DOWNLOAD =================
function downloadCSV() {
  if (!lastResults.length) return;

  let csv = "Email,Status,Score\n";

  lastResults.forEach(r => {
    csv += `${r.email},${r.status},${r.score}\n`;
  });

  const blob = new Blob([csv]);
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "verified_emails.csv";
  a.click();
}

// ================= SAFE DOWNLOAD =================
function downloadSafeCSV() {
  if (!lastResults.length) return;

  const safeRows = lastResults
    .filter(r => r.status === "SAFE")
    .map(r => r.row);

  if (!safeRows.length) {
    alert("No SAFE emails to download");
    return;
  }

  let csv = headers.join(",") + "\n";

  safeRows.forEach(row => {
    csv += headers.map(h => `"${row[h] || ""}"`).join(",") + "\n";
  });

  const blob = new Blob([csv]);
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "safe_cleaned_data.csv";
  a.click();
}
</script>

</body>
</html>
