<!DOCTYPE html>
<html>
<head>
  <title>Free Funnel Audit & Strategy Call | ScaleUp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- MAIN CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    /* HEADER FIX */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .main-nav ul {
      display: flex;
      gap: 25px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .header-cta {
      margin-left: 20px;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 15px;
    }

    .subtext {
      font-size: 16px;
      color: #475569;
      line-height: 1.6;
      max-width: 600px;
      margin: auto;
    }

    .highlight {
      color: #2563eb;
      font-weight: 600;
      background: none !important;
      padding: 0 !important;
    }

    .badge {
      display: inline-block;
      background: rgba(37,99,235,0.1);
      color: #2563eb;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .card {
      max-width: 700px;
      margin: 30px auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 25px;
      text-align: left;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin-bottom: 15px;
    }

    .card ul {
      padding-left: 18px;
    }

    .card li {
      margin-bottom: 10px;
    }

    .urgency {
      margin-top: 25px;
      font-size: 14px;
      color: #dc2626;
    }

    .calendly-wrapper {
      margin-top: 40px;
      background: #ffffff;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid #e2e8f0;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 13px;
      color: #64748b;
    }

    .footer-socials img {
      width: 20px;
      height: 20px;
    }

    .footer-socials a {
      margin-right: 10px;
      display: inline-block;
    }

    /* ✅ FINAL MOBILE MENU FIX (ONLY ADDITION) */
    @media (max-width: 768px) {

      .main-nav {
        display: none;
      }

      .main-nav.active {
        display: block;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: #ffffff;
        z-index: 9999;
      }

      .main-nav.active ul {
        display: flex;
        flex-direction: column;
        padding: 15px 0;
      }

    }

    /* Calendly fix (unchanged) */
    .calendly-inline-widget iframe {
      width: 100% !important;
      min-height: 900px !important;
    }

  </style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">

    <a href="index.html" class="logo">
      <img src="assets/images/logo.png" alt="ScaleUp Sales Funnels Logo">
    </a>

    <nav class="main-nav" id="mainNav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="pages/services.html">Services</a></li>
        <li><a href="pages/portfolio.html">Portfolio</a></li>
        <li><a href="pages/blog.html">Blog</a></li>
        <li><a href="pages/about.html">About</a></li>
        <li><a href="pages/contact.html">Contact</a></li>
      </ul>
    </nav>

    <div class="header-cta">
      <a href="strategy-call.html" class="btn btn-primary">
        Fix My Funnel — No Payment Until It Works
      </a>
    </div>

    <button class="menu-toggle" id="menuToggle">☰</button>

  </div>
</header>

<!-- REST OF YOUR PAGE UNCHANGED -->

<script src="https://assets.calendly.com/assets/external/widget.js"></script>
<script src="js/main.js"></script>

<script>
  const menuToggle = document.getElementById("menuToggle");
  const mainNav = document.getElementById("mainNav");

  if (menuToggle && mainNav) {
    menuToggle.addEventListener("click", function () {
      mainNav.classList.toggle("active");
    });
  }
</script>

</body>
</html>
